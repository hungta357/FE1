<h2>Danh sách truyện</h2>

<div *ngIf="loading">Đang tải dữ liệu...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<table *ngIf="!loading && !error && stories.length" border="1" cellpadding="10" cellspacing="0">
    <tr>
        <th>ID</th>
        <th>Tên truyện</th>
        <th>Tác giả</th>
        <th>Lượt xem</th>
        <th>Hành động</th>
    </tr>

    <tr *ngFor="let story of stories; trackBy: trackById">
        <td>{{ story.id }}</td>
        <td>
            {{ story.title }}
            <span *ngIf="story.views > 90000" class="hot">Hot</span>
        </td>
        <td>{{ story.author }}</td>
        <td>{{ story.views }}</td>
        <td>
            <button (click)="deleteStory(story.id)" [disabled]="deletingIds.has(story.id)">
                {{ deletingIds.has(story.id) ? 'Đang xóa...' : 'Xóa' }}
            </button>
        </td>
    </tr>
</table>

<div *ngIf="!loading && !error && stories.length === 0">Không có truyện nào.</div>
